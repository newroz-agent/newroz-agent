name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Newroz — traces conversations, LLM calls, and tool usage. Opt-in via `newroz plugins enable observability/langfuse` or `newroz tools → Langfuse Observability`."
author: NousResearch
requires_env:
  - NEWROZ_LANGFUSE_PUBLIC_KEY
  - NEWROZ_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
